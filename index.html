<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS FLEXBOX</title>
    <style>
        .container {
            display: flex;
            flex-wrap: wrap;
            background-color: dodgerblue;  
            display: flex;
            flex-wrap: wrap;      
        }

        .container div {
            background-color: #f1f1f1;
            margin: 10px;
            padding: 20px;
            font-size: 24px;
            width: 100px;
        }

    </style>
</head>
<body>
    <h1>Create a flex container</h1>

    <div class="container">
        <div>Item 1</div>
        <div>Item 2</div>
        <div>Item 3</div>
        <div>Item 4</div>
        <div>Item 5</div>
        <div>Item 6</div>
        <div>Item 7</div>
        <div>Item 8</div>
        <div>Item 9</div>
        <div>Item 10</div>
    </div>
    <p>a flex box must have the display property set to flex or inline-flex.</p>

    <p>the direct child element of flex container become automatically flex items.</p>
</body>
</html>
