<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS FLEXBOX</title>
    <style>
        .container {
            display: flex;
            background-color: dodgerblue;        
        }

        .container div {
            background-color: #f1f1f1;
            margin: 10px;
            padding: 20px;
            font-size: 24px;
        }

    </style>
</head>
<body>
    <h1>Create a flex container</h1>

    <div class="container">
        <div>Item 1</div>
        <div>Item 2</div>
        <div>Item 3</div>
        <div>Item 4</div>
    </div>
    <p>a flex box must have the display property set to flex or inline-flex.</p>

    <p>the direct child element of flex container become automatically flex items.</p>
</body>
</html>
